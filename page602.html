<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OTP Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--accent-soft:#fbd6c8;
--otp-box:#f7b7c3;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f7f2eb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.phone{
width:350px;
height:710px;
background:#fff;
border:3px solid #4a413e;
overflow:hidden;
position:relative;
}

.phone-top{
height:160px;
background:linear-gradient(180deg,var(--accent-soft),#fcdece);
padding:15px;
}

.back{
font-size:24px;
}

.brand{
text-align:center;
margin-top:20px;
opacity:0.4;
}

.logo-btn{
width:150px;
max-height:90px;
}

.brand h3{
margin-top:10px;
font-size:18px;
}

.phone-body{
padding:40px 20px;
text-align:center;
}

.otp-title{
font-size:18px;
font-weight:700;
margin-bottom:30px;
}

.otp-row{
display:flex;
justify-content:center;
gap:8px;
}

.otp-box{
width:35px;
height:40px;
background:var(--otp-box);
border:none;
outline:none;
border-radius:4px;
font-size:18px;
font-weight:600;
text-align:center;
}

.otp-box:focus{
background:#f6a7b5;
}

.otp-meta{
margin-top:18px;
font-size:13px;
color:#ef9aa8;
font-weight:600;
}

.resend{
margin-top:18px;
padding:10px 25px;
border:none;
border-radius:40px;
background:#f7f0ed;
color:#c2b7b0;
cursor:pointer;
}

.resend.active{
background:#ffe6e0;
color:#e0808d;
}

#proceedBtn{
margin-left:10px;
}

.captcha{
position:absolute;
right:15px;
bottom:20px;
width:70px;
height:70px;
background:white;
border:1px solid #ddd;
}
#proceedBtn{
background: linear-gradient(180deg, #ffa318, #f48b00);
color: white;
font-weight: 600;
border: none;
margin-left: 10px;
}

</style>

</head>

<body>

<div class="phone">

<div class="phone-top">

<div class="back">&#8592;</div>

<div class="brand">
<img src="logo.jpeg" class="logo-btn">
<h3>Welcome</h3>
</div>

</div>

<div class="phone-body">

<div class="otp-title">
Verify your Phone Number
</div>

<div class="otp-row">

<input type="text" class="otp-box" maxlength="1">
<input type="text" class="otp-box" maxlength="1">
<input type="text" class="otp-box" maxlength="1">
<input type="text" class="otp-box" maxlength="1">
<input type="text" class="otp-box" maxlength="1">
<input type="text" class="otp-box" maxlength="1">

</div>

<div id="otpTimer" class="otp-meta">
93 seconds remaining
</div>

<button class="resend" id="resendBtn">
Resend OTP
</button>

<button id="proceedBtn" class="resend active">
Proceed
</button>

<div class="captcha"></div>

</div>

</div>

<script>

let seconds = 93;
let timer;

const resend = document.getElementById("resendBtn");
const otpTimer = document.getElementById("otpTimer");

function startTimer(){

clearInterval(timer);

seconds = 93;

resend.disabled = true;

timer = setInterval(() => {

seconds--;

otpTimer.innerHTML =
seconds + " seconds remaining";

if(seconds <= 0){

clearInterval(timer);

otpTimer.innerHTML = "OTP Expired";

resend.disabled = false;

resend.classList.add("active");

}

},1000);

}

startTimer();

resend.addEventListener("click", startTimer);


// OTP Auto Jump

const otpInputs =
document.querySelectorAll(".otp-box");

otpInputs.forEach((input,index)=>{

input.addEventListener("input",function(){

this.value =
this.value.replace(/[^0-9]/g,'');

if(this.value && index < otpInputs.length-1){

otpInputs[index+1].focus();

}

});

});


// Proceed Button

document
.getElementById("proceedBtn")
.addEventListener("click",function(){

let otp = "";

otpInputs.forEach(input=>{
otp += input.value;
});

if(otp.length !== 6){

alert("Please enter complete OTP");

return;

}

window.location.href = "page701.html";

});

</script>

</body>
</html>
