<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transmaa UI page 1</title>
  <link rel="stylesheet" href="page01.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script src="page01.js" defer></script>
</head>
<body>

<h2 class="title">Transmaa</h2>

<div class="container">

  <!-- LEFT SIDE (LOGIN) -->
   <div class="main-a">
  <div class="left">
    <div class="card">
       <img src="logo.jpeg " class="logo-btn">
        <h3>Welcome <br> 💖</h3>
        </div>

          <!-- Name Field -->
        <div>
    <div class="form-group">
      <i class="fa fa-user"></i>
<input type="text" id="username" placeholder="Username">
        </div><br>

            <!-- Phone Field -->

    <div class="form-group">
      <span>&nbsp;&nbsp;&nbsp;+91 &nbsp;<b>|</b></span>&nbsp;
      <i class="fa fa-phone"></i>
<input type="tel" id="phone" placeholder="Phone" maxlength="10">
    </div> 
 </div>
</div>
   <button class="login-btn" id="loginBtn">
<i class="fa-duotone fa-solid fa-right-to-bracket" ></i>Login</button>

<button class="driver-btn" id="driverBtn">
Login As Driver
</button>

</div>

</div> 
</body>
</html>
