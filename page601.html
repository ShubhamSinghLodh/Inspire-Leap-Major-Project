<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 6 - Driver Login And Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="page601.css">
  
</head>
<body>
  <main class="page">

    <section class="sheet">
      <div class="showcase">
        <div class="phones">
          <article class="phone">
            <div class="phone-top">
              <div class="back">&#8592;</div>
              <div class="brand">
                <div class="brand-mark">
                <img src="logo.jpeg " class="logo-btn">

                  <!-- <span>Tran</span><span class="accent">S</span><span>Maa</span> -->
                </div>
                <h3>Welcome</h3>
                <p>"Unlock your Journey"<br>Register Today</p>
              </div>
            </div>

            <div class="phone-body">
              <h4>Login</h4>
              <div class="mobile-field">
                <div class="country">+91</div>
                <div class="number-icon">&#128222;</div>
                <input id="phoneNumber" type="tel" placeholder="Enter your number" aria-label="Enter your number">
              </div>
             
             
              <button class="send-otp" id="sendOtpButton" type="button">Send OTP</button>
              <div class="captcha" aria-hidden="true"></div>
            </div>
         
        </div>
      </div>
    </section>
  </main>
   <script src="page601.js"></script>
</body>
</html>
